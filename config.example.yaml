# GitHub Trending scraper configuration
# Copy to config.yaml and fill in your credentials

# Scraping options
language: ""          # Filter by language: python, javascript, go, rust, etc. Empty = all
since: "daily"        # Time range: daily, weekly, monthly
top_n: 10             # Number of repos to fetch

# --- Notification channels (enable the ones you need) ---

# Telegram Bot
telegram:
  enabled: false
  bot_token: "your-bot-token"
  chat_id: "your-chat-id"

# Email (SMTP)
email:
  enabled: false
  smtp_server: "smtp.gmail.com"
  smtp_port: 587
  username: "your-email@gmail.com"
  password: "your-app-password"
  to:
    - "recipient@example.com"
  use_tls: true

# Bark (iOS push notifications)
bark:
  enabled: false
  url: "https://api.day.app/your-bark-key"

# DingTalk Robot
dingtalk:
  enabled: false
  webhook_url: "https://oapi.dingtalk.com/robot/send?access_token=your-token"

# Feishu/Lark Robot
feishu:
  enabled: false
  webhook_url: "https://open.feishu.cn/open-apis/bot/v2/hook/your-token"

# Generic Webhook (POST JSON)
webhook:
  enabled: false
  url: "https://your-webhook-endpoint.com/hook"
